name: Bug report
description: Report incorrect routing, unsafe behavior, broken code, or a spatial failure.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: task
    attributes:
      label: Reproduction task
      description: Provide the smallest safe prompt, input description, and steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Agent runtime and version
      placeholder: Codex, Claude Code, Cursor, Copilot, or other
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Data and privacy notes
      description: Confirm that the report contains no secrets or sensitive location data.

